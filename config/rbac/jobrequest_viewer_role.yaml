# This rule is not used by the project govuk-job-request-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to platform.gov.uk resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: govuk-job-request-operator
    app.kubernetes.io/managed-by: kustomize
  name: jobrequest-viewer-role
rules:
- apiGroups:
  - platform.publishing.service.gov.uk
  resources:
  - jobrequests
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - platform.publishing.service.gov.uk
  resources:
  - jobrequests/status
  verbs:
  - get
